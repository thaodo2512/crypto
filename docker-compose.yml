services:
  bot:
    build:
      context: .
      target: bot
    container_name: crypto-signal-bot
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os; assert os.path.exists('data/signals.db')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
